name: Nightly Builds

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output_name: weatherhds-linux-amd64
          - goos: windows
            goarch: amd64
            output_name: weatherhds-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            output_name: weatherhds-darwin-amd64
          - goos: darwin
            goarch: arm64
            output_name: weatherhds-darwin-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '>=1.20'
        cache: true

    - name: Build Binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        go build -v -o ${{ matrix.output_name }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.output_name }}
        path: ${{ matrix.output_name }}